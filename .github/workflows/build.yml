name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up environment
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm

      - name: Build for Termux
        run: |
          make build-termux

      - name: Build for Debian
        run: |
          make build-debian

      - name: Build for RPM
        run: |
          make build-rpm

      - name: Verify Artifacts
        run: |
          ls -l out